    async function redisFetch(c, cmd, ...args) {
        const key = args[0]; const url = `${c.url.replace(/\/$/,'')}/${cmd}/${encodeURIComponent(key)}`;
        const headers = { 'Authorization': `Bearer ${c.token}` }; let m = 'GET', b = null;
        if (cmd === 'set') { m = 'POST'; b = args[1]; } else if (cmd === 'del') { m = 'POST'; }
        const res = await fetch(url, { method:m, headers, body:b }); if (!res.ok) throw new Error(`Erro ${res.status}`);
        const data = await res.json(); return data.result !== undefined ? data.result : data;
    }
    async function redisGet(c,k) { try { return await redisFetch(c,'get',k); } catch { return null; } }
    async function redisSet(c,k,v) { try { return (await redisFetch(c,'set',k,JSON.stringify(v))) === 'OK'; } catch { return false; } }
    async function redisDel(c,k) { try { return await redisFetch(c,'del',k); } catch { return false; } }
    async function redisKeys(c,p) { try { const r = await redisFetch(c,'keys',p); return Array.isArray(r) ? r : [r]; } catch { return []; } }

    function slugify(t) { return t.toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'').replace(/_+/g,'_'); }
    function gerarHash(t,s=16) { let h=0; for(let i=0;i<t.length;i++){ h=((h<<5)-h)+t.charCodeAt(i); h|=0; } return (Math.abs(h).toString(36)+Date.now().toString(36)).substring(0,s); }

    function copiarTexto(texto, fbId) {
        const fb = document.getElementById(fbId);
        const show = (msg, ok) => { if(!fb) return; fb.textContent=msg; fb.style.color=ok?'var(--success)':'var(--error)'; fb.classList.add('show'); setTimeout(()=>fb.classList.remove('show'),2000); };
        if (!texto) return show('Nada para copiar', false);
        if (navigator.clipboard && window.isSecureContext) { navigator.clipboard.writeText(texto).then(()=>show('✓ Copiado',true)).catch(()=>fallbackCopy(texto,show)); }
        else { fallbackCopy(texto, show); }
    }
    function fallbackCopy(txt, cb) {
        const ta = document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.left='-9999px';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy') ? cb('✓ Copiado',true) : cb('❌ Falha',false); } catch { cb('❌ Erro',false); }
        document.body.removeChild(ta);
    }

    const knowledgeTree = {};
    RAW_DATA.forEach(line => {
        const parts = line.split('|').map(s=>s.trim());
        if (parts.length < 3) return;
        const [area, subarea, tema] = parts;
        const tags = parts[3] ? parts[3].split(',').map(t=>t.trim()) : [];
        if (!knowledgeTree[area]) knowledgeTree[area] = {};
        if (!knowledgeTree[area][subarea]) knowledgeTree[area][subarea] = [];

    window._todosACIs = []; window._selectedACI = null;
    async function carregarTodosACIs() {
        const clusters = getClusters(); const todos = [];
        for (const cluster of clusters) {
            try {
                let keys = await redisKeys(cluster, 'aci:*'); const keys2 = await redisKeys(cluster, 'idenza:*');
                keys = [...new Set([...keys, ...keys2])];
                for (const key of keys) {
                    const raw = await redisGet(cluster, key);
                    if (raw) {
                        let aci; try { aci = typeof raw === 'string' ? JSON.parse(raw) : raw; } catch { aci = { raw, uid:key, titulo:'Dado bruto' }; }
                        aci._redisKey = key; aci._clusterName = cluster.name; aci._clusterUrl = cluster.url; aci._cluster = cluster;
                        todos.push(aci);
                    }
                }
            } catch(e) { console.warn(e); }
        }
        return todos;
    }
    function renderizarTabelaGovernanca(acis, filtro='') {
        const tbody = document.getElementById('govTabelaBody'), statusMsg = document.getElementById('govStatusMsg');
        let filtered = acis;
        if (filtro.trim()) {
            const term = filtro.trim().toLowerCase();
            filtered = acis.filter(a => {
                const uid = (a.uid || a._redisKey || '').toLowerCase();
                const titulo = (a.titulo || a.nome || '').toLowerCase();
                const hash = (a.hash || '').toLowerCase();
                return uid.includes(term) || titulo.includes(term) || hash.includes(term);
            });
        }
        if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">Nenhum ACI encontrado.</td></tr>'; statusMsg.textContent = `Total: ${acis.length} ACIs.`; atualizarEstatisticas(acis); return; }
        let html = ''; const agora = new Date();
        for (const aci of filtered) {
            const uid = aci.uid || aci._redisKey || 'N/A';
            const titulo = aci.titulo || aci.nome || 'Sem título';
            const versao = aci.version || aci.versao || '1.0.0';
            const hash = aci.hash || aci.compliance?.hash_conteudo?.substring(0,12) || '---';
            const cluster = aci._clusterName || 'Desconhecido';
            let statusClass = 'badge-valid', statusText = 'Válido';
            const validoAte = aci.valido_ate || aci.alertaRevisao;
            if (validoAte) {
                const dataValidade = new Date(validoAte);
                if (dataValidade < agora) { statusClass = 'badge-expired'; statusText = 'Expirado'; }
                else if (dataValidade - agora < 30*86400000) { statusClass = 'badge-review'; statusText = 'Revisão'; }
            }
            if (aci.conflitos && aci.conflitos.length > 0) { statusClass = 'badge-conflict'; statusText = 'Conflito'; }
            const temN2 = aci.camadas_n2 ? true : false; const temN3 = aci.nivel_3 ? true : false;
            let maturidadeHtml = temN3 ? '<span class="badge badge-n3">N3</span>' : temN2 ? '<span class="badge badge-n2">N2</span>' : '<span class="badge" style="background:#aaa;">N1</span>';
            html += `<tr>
                <td><code>${uid.substring(0,20)}</code></td><td><strong>${titulo}</strong></td>
                <td><span class="badge" style="background:#6c757d;">v${versao}</span></td>
                <td><span class="${statusClass}">${statusText}</span></td><td>${maturidadeHtml}</td>
                <td><code>${hash}</code></td><td>${cluster}</td>
                <td><div class="action-buttons" style="display:flex;gap:4px;">

                    <button class="btn btn-data btn-sm" onclick="revalidarACI('${uid}')">🔄</button>

                    <button class="btn btn-danger btn-sm" onclick="excluirACI('${uid}')">🗑️</button>
                </div></td></tr>`;
        }
        tbody.innerHTML = html; statusMsg.textContent = `Exibindo ${filtered.length} de ${acis.length} ACIs.`;
        atualizarEstatisticas(acis);
    }
    function atualizarEstatisticas(acis) {
        const agora = new Date(); let ativos=0, expirados=0, revisao=0, conflitos=0, n2=0, n3=0;
        for (const aci of acis) {
            const validoAte = aci.valido_ate || aci.alertaRevisao;
            if (aci.conflitos && aci.conflitos.length > 0) { conflitos++; continue; }
            if (validoAte) {
                const dataValidade = new Date(validoAte);
                if (dataValidade < agora) expirados++;
                else if (dataValidade - agora < 30*86400000) revisao++;
                else ativos++;
            } else ativos++;
            if (aci.camadas_n2) n2++; if (aci.nivel_3) n3++;
        }
        document.getElementById('govTotalAtivos').textContent = ativos;
        document.getElementById('govTotalExpirados').textContent = expirados;
        document.getElementById('govTotalRevisao').textContent = revisao;
        document.getElementById('govTotalConflitos').textContent = conflitos;
        document.getElementById('govTotalN2').textContent = n2;
        document.getElementById('govTotalN3').textContent = n3;
        document.getElementById('govTotalTotal').textContent = acis.length;
    }

            try { await redisFetch(cluster,'ping'); status='connected'; dotClass='on'; statusText='Conectado'; } catch {}

                ${isOficial ? '<span class="badge badge-principal">PRINCIPAL</span>' : ''}
                ${!cluster.fixed?`<button class="btn btn-outline btn-sm" onclick="removerCluster('${cluster.name}')">🗑️</button>`:''}

    }
    window.removerCluster = function(nome) {
        if(!confirm(`Remover cluster "${nome}"?`)) return;
        const clusters = getClusters(); const atualizados = clusters.filter(c=>c.name!==nome);
        saveClusters(atualizados.filter(c=>!c.fixed)); carregarGovernanca();
    };

    async function carregarGovernanca() {
        document.getElementById('govStatusMsg').textContent = '⏳ Carregando ACIs...';
        try {
            const acis = await carregarTodosACIs(); window._todosACIs = acis;
            renderizarTabelaGovernanca(acis, document.getElementById('govSearchInput').value);
            await renderizarRegistry();
            document.getElementById('govStatusMsg').textContent = `✅ ${acis.length} ACIs carregados.`;
        } catch(e) { document.getElementById('govStatusMsg').textContent = `❌ Erro: ${e.message}`; }
    }

    document.getElementById('govSearchBtn').onclick = () => renderizarTabelaGovernanca(window._todosACIs, document.getElementById('govSearchInput').value);
    document.getElementById('govRefreshBtn').onclick = carregarGovernanca;
    document.getElementById('govAddAciBtn').onclick = () => {
        const clusters = getClusters(); const select = document.getElementById('novoAciCluster'); select.innerHTML = '';
        clusters.forEach(c=>{ const opt = document.createElement('option'); opt.value=c.name; opt.textContent=c.name; select.appendChild(opt); });
        document.getElementById('govNovoAciOverlay').classList.add('open');
    };
    document.getElementById('novoAciFechar').onclick = () => document.getElementById('govNovoAciOverlay').classList.remove('open');
    document.getElementById('novoAciSalvar').onclick = async () => {
        const uid = document.getElementById('novoAciUid').value.trim() || 'aci_'+Date.now().toString(36);
        const titulo = document.getElementById('novoAciTitulo').value.trim() || 'Novo ACI';
        const versao = document.getElementById('novoAciVersao').value.trim() || '1.0.0';
        let conteudo; try { conteudo = JSON.parse(document.getElementById('novoAciConteudo').value); } catch { document.getElementById('novoAciStatus').textContent='❌ JSON inválido.'; return; }
        const clusterName = document.getElementById('novoAciCluster').value;
        const cluster = getClusters().find(c=>c.name===clusterName); if(!cluster) { document.getElementById('novoAciStatus').textContent='❌ Cluster não encontrado.'; return; }
        const compliance = criarCompliance({ autor:'IDEnza Admin', nivelMaturidade:'ACI', status:'criado' });
        const aci = { uid, titulo, versao, ...conteudo, compliance, valido_ate: new Date(Date.now()+90*86400000).toISOString() };
        atualizarHashCompliance(aci);
        const result = await redisSet(cluster, `aci:${uid}`, aci);
        if(result) { document.getElementById('govNovoAciOverlay').classList.remove('open'); carregarGovernanca(); }
        else document.getElementById('novoAciStatus').textContent = '❌ Erro ao salvar.';
    };
    document.getElementById('govAddClusterBtn').onclick = () => document.getElementById('govAddClusterOverlay').classList.add('open');
    document.getElementById('novoClusterFechar').onclick = () => document.getElementById('govAddClusterOverlay').classList.remove('open');
    document.getElementById('novoClusterSalvar').onclick = () => {
        const nome = document.getElementById('novoClusterNome').value.trim();
        const url = document.getElementById('novoClusterUrl').value.trim();
        const token = document.getElementById('novoClusterToken').value.trim();
        if(!nome||!url||!token) { document.getElementById('novoClusterStatus').textContent='⚠️ Preencha todos os campos.'; return; }
        const clusters = getClusters(); if(clusters.find(c=>c.name===nome)) { document.getElementById('novoClusterStatus').textContent='⚠️ Nome já existe.'; return; }
        const novo = { name:nome, url, token, color:'#888', fixed:false };
        saveClusters([...clusters.filter(c=>!c.fixed), novo]);
        document.getElementById('govAddClusterOverlay').classList.remove('open'); carregarGovernanca();
    };
    document.getElementById('govModalFechar').onclick = () => document.getElementById('govModalOverlay').classList.remove('open');
    document.getElementById('govModalRevalidar').onclick = () => { if(window._selectedACI) { revalidarACI(window._selectedACI.uid||window._selectedACI._redisKey); document.getElementById('govModalOverlay').classList.remove('open'); } };
    document.getElementById('govModalRegenerar').onclick = async () => { if(window._selectedACI) { window._selectedACI.requires_regeneration=true; const cluster = getClusters().find(c=>c.name===window._selectedACI._clusterName); if(cluster) { await redisSet(cluster, window._selectedACI._redisKey, window._selectedACI); carregarGovernanca(); } document.getElementById('govModalOverlay').classList.remove('open'); } };
    document.getElementById('govModalExcluir').onclick = () => { if(window._selectedACI) { excluirACI(window._selectedACI.uid||window._selectedACI._redisKey); document.getElementById('govModalOverlay').classList.remove('open'); } };
    document.querySelectorAll('.slot-modal-overlay').forEach(overlay => { overlay.addEventListener('click', (e) => { if(e.target===overlay) overlay.classList.remove('open'); }); });

    // ==================== RECICLAGEM ====================
    function preencherSelectReciclagem() {
        const clusters = getClusters();
        ['recClusterSource','recClusterTarget'].forEach(id=>{ const sel=document.getElementById(id); if(sel) sel.innerHTML=clusters.map(c=>`<option>${c.name}</option>`).join(''); });
    }
    document.getElementById('btnScanReciclagem').onclick = async () => {
        const src = document.getElementById('recClusterSource').value, tgt = document.getElementById('recClusterTarget').value;
        const source = getClusters().find(c=>c.name===src), target = getClusters().find(c=>c.name===tgt);
        if(!source||!target) return;
        const srcKeys = await redisKeys(source, 'aci:*'); const tgtKeys = await redisKeys(target, 'aci:*');
        const novos = srcKeys.filter(k=>!tgtKeys.includes(k));
        document.getElementById('novosTemasBody').innerHTML = novos.map(k=>`<tr><td><input type="checkbox" class="check-novo" data-key="${k}"></td><td>${k}</td><td>Novo</td></tr>`).join('');
        document.getElementById('btnIntegrarSelecionados').disabled = novos.length===0;
        document.getElementById('selecionarTodos').onclick = (e) => document.querySelectorAll('.check-novo').forEach(cb=>cb.checked=e.target.checked);
    };
    document.getElementById('btnIntegrarSelecionados').onclick = async () => {
        const checkboxes = document.querySelectorAll('.check-novo:checked');
        const target = getClusters().find(c=>c.name===document.getElementById('recClusterTarget').value);
        let count=0;
        for(const cb of checkboxes) {
            const key = cb.dataset.key;
            const raw = await redisGet(getClusters().find(c=>c.name===document.getElementById('recClusterSource').value), key);
            if(raw) { await redisSet(target, key, typeof raw==='string'?JSON.parse(raw):raw); count++; }
        }
        document.getElementById('recFeedback').className = 'redis-feedback show success';
        document.getElementById('recFeedback').textContent = `✅ ${count} integrados.`;
    };

    // ==================== REESTRUTURAR ====================
    function atualizarSelectReestruturar() {
        const select = document.getElementById('reestruturarClusterOrigem');
        if (!select) return;
        const clusters = getClusters().filter(c => c.name !== 'Caixa Preta Oficial');
        select.innerHTML = '<option value="">— Manual (cole JSON abaixo) —</option>';
        const bruta = clusters.find(c => c.name === 'Caixa Preta Bruta');
        if (bruta) {
            const opt = document.createElement('option'); opt.value = bruta.name; opt.textContent = bruta.name + ' (origem padrão)';
            select.appendChild(opt);
        }
        clusters.filter(c => c.name !== 'Caixa Preta Bruta').forEach(c => {
            const opt = document.createElement('option'); opt.value = c.name; opt.textContent = c.name;
            select.appendChild(opt);
        });
    }
    const reestruturarClusterOrigem = document.getElementById('reestruturarClusterOrigem');
    const reestruturarChave = document.getElementById('reestruturarChave');
    const reestruturarJson = document.getElementById('reestruturarJson');
    const btnAnalisarReestruturar = document.getElementById('btnAnalisarReestruturar');
    const reestruturarDiagnostico = document.getElementById('reestruturarDiagnostico');
    const reestruturarResultado = document.getElementById('reestruturarResultado');
    const btnEnviarCaixaVerde = document.getElementById('btnEnviarParaCaixaVerde');
    const reestruturarStatus = document.getElementById('reestruturarStatus');

    if (reestruturarClusterOrigem) {
        reestruturarClusterOrigem.addEventListener('change', async () => {
            const clusterName = reestruturarClusterOrigem.value;
            const chave = reestruturarChave.value.trim();
            if (!clusterName || !chave) return;
            const cluster = getClusters().find(c => c.name === clusterName);
            if (!cluster) return;
            reestruturarStatus.textContent = '⏳ Buscando conteúdo...';
            try {
                const raw = await redisGet(cluster, chave);
                if (raw) { reestruturarJson.value = JSON.stringify(raw, null, 2); reestruturarStatus.textContent = '✅ Conteúdo carregado.'; }
                else reestruturarStatus.textContent = '❌ Chave não encontrada.';
            } catch (e) { reestruturarStatus.textContent = '❌ Erro ao buscar.'; }
        });
    }
    function analisarConteudo(jsonObj) {
        const temCamadas = Array.isArray(jsonObj.camadas);
        const temCamadasN2 = Array.isArray(jsonObj.camadas_n2);
        const temNivel3 = jsonObj.nivel_3 && typeof jsonObj.nivel_3 === 'object';
        const temArtigoCientifico = jsonObj.artigo_cientifico && typeof jsonObj.artigo_cientifico === 'object';
        const temArtigoRevista = jsonObj.artigo_revista && typeof jsonObj.artigo_revista === 'object';
        if (temArtigoRevista) return { nivel: 'Revista', descricao: 'Artigo de revista detectado.' };
        if (temArtigoCientifico) return { nivel: 'Científico', descricao: 'Artigo científico detectado.' };
        if (temNivel3 && temCamadasN2 && temCamadas) return { nivel: 'N3', descricao: 'Documento completo com N1, N2 e N3.' };
        if (temCamadasN2 && temCamadas) return { nivel: 'N2', descricao: 'Possui camadas N1 e N2.' };
        if (temCamadas && jsonObj.camadas.length === 7) return { nivel: 'N1', descricao: 'Possui 7 camadas típicas de N1.' };
        if (temCamadas) return { nivel: 'N1 (parcial)', descricao: 'Possui camadas, mas não exatamente 7.' };
        return { nivel: 'Desconhecido', descricao: 'Formato não reconhecido — template N1 será criado a partir dos metadados.' };
    }
    if (btnAnalisarReestruturar) {
        btnAnalisarReestruturar.addEventListener('click', () => {
            const texto = reestruturarJson.value.trim();
            if (!texto) { alert('Cole o JSON para análise.'); return; }
            let json;
            try { json = JSON.parse(texto); } catch (e) {
                reestruturarResultado.innerHTML = '<span style="color:red;">JSON inválido.</span>';
                reestruturarDiagnostico.style.display = 'block'; btnEnviarCaixaVerde.disabled = true; return;
            }
            const analise = analisarConteudo(json);
            reestruturarResultado.innerHTML = `
                <p><strong>Nível detectado:</strong> <span style="color:var(--reestruturar-accent);">${analise.nivel}</span></p>
                <p><strong>Descrição:</strong> ${analise.descricao}</p>
                <p><strong>Título/Identificador:</strong> ${json.codigo_universal || json.uid || 'N/A'}</p>
            `;
            reestruturarDiagnostico.style.display = 'block'; btnEnviarCaixaVerde.disabled = false;
            btnEnviarCaixaVerde._jsonAnalisado = json; btnEnviarCaixaVerde._analise = analise;
        });
    }
    if (btnEnviarCaixaVerde) {
        btnEnviarCaixaVerde.addEventListener('click', async () => {
            const jsonOriginal = btnEnviarCaixaVerde._jsonAnalisado;
            const analise = btnEnviarCaixaVerde._analise;
            if (!jsonOriginal) return;
            const clusterOficial = getClusters().find(c => c.name === 'Caixa Preta Oficial');
            if (!clusterOficial) { reestruturarStatus.textContent = '❌ Cluster Caixa Preta Oficial não encontrado.'; return; }
            const codigoUniversal = jsonOriginal.codigo_universal || `reestruturado.${slugify(analise.nivel)}.${Date.now().toString(36)}`;
            const chaveRedis = `idenza:reestruturado:${codigoUniversal}`;
            let payload;
            if (analise.nivel === 'Desconhecido') {
                const palavrasChave = jsonOriginal.indexacao?.palavras_chave || (jsonOriginal.tags ? jsonOriginal.tags.split(',').map(s=>s.trim()) : []);
                const dominio = jsonOriginal.area || jsonOriginal.dominio || '';
                const topico = jsonOriginal.topico || jsonOriginal.titulo || codigoUniversal;
                const nomesCamadas = ['Essência','Teorias e Fundamentos','Estrutura e Processos','Aplicação Prática','Métodos e Ferramentas','Uso Cotidiano e Inovação','Curiosidades e Marcos Históricos'];
                const camadasTemplate = nomesCamadas.map((nome, i) => ({ nivel:i+1, nome, descricao:'', subtemas:[], conceitos_chave:[], fontes:[] }));
                payload = {
                    codigo_universal: codigoUniversal, camadas: camadasTemplate,
                    compliance: criarCompliance({ autor:'IDEnza Reestruturador', palavrasChave, referencias:[], nivelMaturidade:'N1 (template)', status:'reestruturado_pendente' }),
                    metadados: { dominio, topico, palavrasChave, origem:'reestruturado a partir de formato desconhecido' }
                };
            } else if (analise.nivel.includes('N1') || analise.nivel.includes('N2') || analise.nivel.includes('N3')) {
                payload = {
                    codigo_universal: codigoUniversal, camadas: jsonOriginal.camadas || [], camadas_n2: jsonOriginal.camadas_n2 || null, nivel_3: jsonOriginal.nivel_3 || null,
                    compliance: criarCompliance({ autor:jsonOriginal.compliance?.autor||'IDEnza Reestruturador', palavrasChave:jsonOriginal.indexacao?.palavras_chave||[], referencias:(jsonOriginal.camadas||[]).flatMap(c=>c.fontes||[]), nivelMaturidade:analise.nivel, status:'reestruturado' }),
                    indexacao: jsonOriginal.indexacao || {}, origem: { ...(jsonOriginal.origem||{}), reestruturado_em:agoraISO() }
                };
            } else if (analise.nivel === 'Científico') {
                payload = {
                    codigo_universal: codigoUniversal, artigo_cientifico: jsonOriginal.artigo_cientifico,
                    compliance: criarCompliance({ autor:jsonOriginal.compliance?.autor||'IDEnza Reestruturador', palavrasChave:jsonOriginal.artigo_cientifico?.palavras_chave||[], referencias:jsonOriginal.artigo_cientifico?.referencias||[], nivelMaturidade:'Científico', status:'reestruturado' })
                };
            } else if (analise.nivel === 'Revista') {
                payload = {
                    codigo_universal: codigoUniversal, artigo_revista: jsonOriginal.artigo_revista,
                    compliance: criarCompliance({ autor:jsonOriginal.artigo_revista?.autores||'IDEnza Reestruturador', licenca:jsonOriginal.artigo_revista?.licenca||'CC BY 4.0', palavrasChave:jsonOriginal.artigo_revista?.palavras_chave||[], referencias:jsonOriginal.artigo_revista?.referencias||[], nivelMaturidade:'Revista', status:'reestruturado' })
                };
            }
            atualizarHashCompliance(payload);
            reestruturarStatus.textContent = '⏳ Enviando para Caixa Preta Oficial...';
            try {
                const ok = await redisSet(clusterOficial, chaveRedis, payload);
                reestruturarStatus.textContent = ok ? `✅ Salvo! Chave: ${chaveRedis}` : '❌ Falha ao salvar.';
            } catch (e) { reestruturarStatus.textContent = '❌ Erro: ' + e.message; }
        });
    }

    // Inicialização
    carregarGovernanca();
    renderTree();
    console.log('✅ IDEnza — Revista IDEnza pronta para gerar artigos HTML completos.');
})();
</script>
</body>
</html>
